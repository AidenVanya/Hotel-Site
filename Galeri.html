<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  .page-hero { height: 50vh; min-height: 380px; }
  .page-hero-bg { background-image: url('https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=1800&q=80'); }
  .page-hero-overlay { background: linear-gradient(to bottom, rgba(10,10,10,0.25) 0%, rgba(10,10,10,0.7) 65%, var(--black) 100%); }

  #app { min-height: 60vh; }

  /* FILTER TABS */
  .filter-tabs { padding: 2.5rem 4rem 0; max-width: 1280px; margin: 0 auto; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-tab-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-right: 0.5rem; }
  .filter-tab { background: transparent; border: 1px solid rgba(201,168,76,0.18); color: var(--text-muted); padding: 0.5rem 1.3rem; font-family: var(--font-body); font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
  .filter-tab:hover { border-color: var(--gold); color: var(--gold); }
  .filter-tab.active { border-color: var(--gold); color: var(--black); background: var(--gold); }

  /* MASONRY GRID */
  .gallery-section { padding: 2.5rem 4rem 5rem; max-width: 1280px; margin: 0 auto; }
  .masonry { columns: 3; column-gap: 6px; }
  .masonry-item { break-inside: avoid; margin-bottom: 6px; position: relative; overflow: hidden; cursor: zoom-in; display: block; }
  .masonry-item img { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), filter 0.4s; filter: brightness(0.82) saturate(0.9); }
  .masonry-item:hover img { transform: scale(1.05); filter: brightness(1) saturate(1.1); }
  .masonry-item-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.65) 0%, transparent 50%); opacity: 0; transition: opacity 0.4s; display: flex; align-items: flex-end; padding: 1.2rem; }
  .masonry-item:hover .masonry-item-overlay { opacity: 1; }
  .masonry-item-label { font-family: var(--font-display); font-size: 1.1rem; color: var(--white); line-height: 1.2; }
  .masonry-item-cat { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.2rem; }
  .zoom-icon { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; border-radius: 50%; background: rgba(10,10,10,0.6); border: 1px solid rgba(201,168,76,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.8); transition: opacity 0.3s, transform 0.3s; }
  .masonry-item:hover .zoom-icon { opacity: 1; transform: scale(1); }

  /* LIGHTBOX */
  .lightbox-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(5,5,5,0.97); display: flex; align-items: center; justify-content: center; animation: lbIn 0.25s cubic-bezier(0.16,1,0.3,1); }
  @keyframes lbIn { from { opacity:0; } to { opacity:1; } }
  .lightbox-img-wrap { position: relative; max-width: min(90vw, 1200px); max-height: 85vh; display: flex; align-items: center; justify-content: center; animation: lbImgIn 0.35s cubic-bezier(0.16,1,0.3,1); }
  @keyframes lbImgIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
  .lightbox-img { max-width: 100%; max-height: 85vh; object-fit: contain; display: block; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
  .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; width: 46px; height: 46px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 1.1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; z-index: 10; }
  .lightbox-close:hover { background: rgba(201,168,76,0.25); }
  .lightbox-prev, .lightbox-next { position: fixed; top: 50%; transform: translateY(-50%); width: 56px; height: 56px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, border-color 0.2s; z-index: 10; }
  .lightbox-prev { left: 1.5rem; }
  .lightbox-next { right: 1.5rem; }
  .lightbox-prev:hover, .lightbox-next:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }
  .lightbox-info { position: fixed; bottom: 0; left: 0; right: 0; padding: 1.5rem 2rem; text-align: center; background: linear-gradient(to top, rgba(5,5,5,0.9), transparent); }
  .lightbox-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--white); }
  .lightbox-cat { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
  .lightbox-counter { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-muted); margin-top: 0.4rem; }
  .lightbox-thumbs { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; max-width: 80vw; overflow-x: auto; padding: 0 1rem; }
  .lightbox-thumb { width: 56px; height: 42px; flex-shrink: 0; object-fit: cover; opacity: 0.4; cursor: pointer; transition: opacity 0.25s, outline 0.25s; outline: 2px solid transparent; }
  .lightbox-thumb.active { opacity: 1; outline: 2px solid var(--gold); }

  @media (max-width: 1023px) {
    .masonry { columns: 2; }
    .filter-tabs { padding: 2rem 2rem 0; overflow-x: auto; flex-wrap: nowrap; }
    .gallery-section { padding: 2rem 2rem 4rem; }
  }
  @media (max-width: 767px) {
    .masonry { columns: 1; }
    .filter-tabs { padding: 1.5rem 1.25rem 0; }
    .gallery-section { padding: 1.5rem 1.25rem 3rem; }
    .filter-tab { white-space: nowrap; }
    .lightbox-thumbs { display: none; }
    .lightbox-prev { left: 0.5rem; }
    .lightbox-next { right: 0.5rem; }
  }
</style>
</head>
<body>

<nav class="nav--solid">
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-name">HOTEL MASTER</span>
    <span class="nav-logo-sub">Luxury &amp; Excellence</span>

  <ul class="nav-links">

  <div class="page-hero-bg"></div>

  <div class="page-hero-content">

      <a href="index.html">Anasayfa</a>

</div>

<div id="app"></div>

<footer>
  <div class="footer-bottom">
    <a href="index.html" class="footer-back">
      <svg width="16" height="10" viewBox="0 0 16 10" fill="none"><path d="M15 5H1M6 1L2 5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Anasayfaya Dön

  </div>
</footer>

<script src="js/main.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const PHOTOS = [
  { id:1,  cat:'Odalar',    label:'Executive Oda',       src:'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=200&q=70' },
  { id:2,  cat:'Odalar',    label:'Deluxe Oda',           src:'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=200&q=70' },
  { id:3,  cat:'Odalar',    label:'Balayı Suite',         src:'https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=200&q=70' },
  { id:4,  cat:'Odalar',    label:'Presidential Suite',   src:'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=200&q=70' },
  { id:5,  cat:'Odalar',    label:'Classic Oda',          src:'https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=200&q=70' },
  { id:6,  cat:'Havuz',     label:'Ana Yüzme Havuzu',     src:'https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=200&q=70' },
  { id:7,  cat:'Havuz',     label:'Gece Havuzu',          src:'https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=200&q=70' },
  { id:8,  cat:'Restoran',  label:'Ana Restoran',         src:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=200&q=70' },
  { id:9,  cat:'Restoran',  label:'Kahvaltı Salonu',      src:'https://images.unsplash.com/photo-1551218808-94e220e084d2?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1551218808-94e220e084d2?w=200&q=70' },
  { id:10, cat:'Spa',       label:'Hamam & Spa',          src:'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=200&q=70' },
  { id:11, cat:'Spa',       label:'Masaj Salonu',         src:'https://images.unsplash.com/photo-1519823551278-64ac92734fb1?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1519823551278-64ac92734fb1?w=200&q=70' },
  { id:12, cat:'Lobi',      label:'Ana Lobi',             src:'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=200&q=70' },
  { id:13, cat:'Lobi',      label:'Resepsiyon',           src:'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=200&q=70' },
  { id:14, cat:'Aktivite',  label:'Toplantı Salonu',      src:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=200&q=70' },
  { id:15, cat:'Aktivite',  label:'Eğlence & Bar',        src:'https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=200&q=70' },
  { id:16, cat:'Dış Mekan', label:'Otel Binası',          src:'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=200&q=70' },
  { id:17, cat:'Dış Mekan', label:'Bahçe',                src:'https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=200&q=70' },
  { id:18, cat:'Aktivite',  label:'Balayı Süslemesi',     src:'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=1400&q=85', thumb:'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=200&q=70' },
];

const CATS = ['Tümü', 'Odalar', 'Havuz', 'Restoran', 'Spa', 'Lobi', 'Aktivite', 'Dış Mekan'];

function Lightbox({ photos, startIdx, onClose }) {
  const [idx, setIdx] = useState(startIdx);
  const prev = useCallback(() => setIdx(i => (i - 1 + photos.length) % photos.length), [photos.length]);
  const next = useCallback(() => setIdx(i => (i + 1) % photos.length), [photos.length]);
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'ArrowLeft') prev();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'Escape') onClose();
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [prev, next, onClose]);
  const photo = photos[idx];
  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <button className="lightbox-close" onClick={onClose}>✕</button>
      <button className="lightbox-prev" onClick={e => { e.stopPropagation(); prev(); }}>
        <svg width="12" height="18" viewBox="0 0 12 18" fill="none"><path d="M10 1L2 9l8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <div className="lightbox-img-wrap" onClick={e => e.stopPropagation()} key={idx}>
        <img src={photo.src} className="lightbox-img" alt={photo.label} />
      </div>
      <button className="lightbox-next" onClick={e => { e.stopPropagation(); next(); }}>
        <svg width="12" height="18" viewBox="0 0 12 18" fill="none"><path d="M2 1l8 8-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      <div className="lightbox-thumbs" onClick={e => e.stopPropagation()}>
        {photos.map((p, i) => (
          <img key={p.id} src={p.thumb} className={`lightbox-thumb${i === idx ? ' active' : ''}`} alt="" onClick={() => setIdx(i)} />
        ))}
      </div>
      <div className="lightbox-info" onClick={e => e.stopPropagation()}>
        <div className="lightbox-cat">{photo.cat}</div>
        <div className="lightbox-title">{photo.label}</div>
        <div className="lightbox-counter">{idx + 1} / {photos.length}</div>
      </div>
    </div>
  );
}

function App() {
  const [cat, setCat] = useState('Tümü');
  const [lightbox, setLightbox] = useState(null);
  const filtered = cat === 'Tümü' ? PHOTOS : PHOTOS.filter(p => p.cat === cat);
  return (
    <div>
      <div className="filter-tabs">
        <span className="filter-tab-label">Kategori:</span>
        {CATS.map(c => (
          <button key={c} className={`filter-tab${cat === c ? ' active' : ''}`} onClick={() => setCat(c)}>{c}</button>
        ))}
      </div>
      <div className="gallery-section">
        <div className="masonry">
          {filtered.map((photo, i) => (
            <div className="masonry-item" key={photo.id} onClick={() => setLightbox({ photos: filtered, idx: i })}>
              <img src={photo.src} alt={photo.label} loading="lazy" />
              <div className="zoom-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </div>
              <div className="masonry-item-overlay">
                <div>
                  <div className="masonry-item-cat">{photo.cat}</div>
                  <div className="masonry-item-label">{photo.label}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {lightbox && <Lightbox photos={lightbox.photos} startIdx={lightbox.idx} onClose={() => setLightbox(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
